<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Registrer resultat</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>

<main>
    <section class="info-section">
        <h2>Registrer resultat for <span th:text="${event.name}"></span></h2>

        <form th:action="@{/results/event/{eventId}/register(eventId=${event.id})}" th:object="${result}" method="post">
            <label for="playerId">Spiller</label>
            <select id="playerId" name="playerId" required>
                <option value="">Vælg spiller</option>
                <option th:each="player : ${players}" th:value="${player.id}" th:text="${player.username}"></option>
            </select>

            <label for="placement">Placering</label>
            <input type="number" id="placement" name="placement" min="1" required>

            <div class="action-col">
                <button type="submit">Gem resultat</button>
                <a class="btn btn-secondary" th:href="@{/events/{id}(id=${event.id})}">Tilbage</a>
            </div>
        </form>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
