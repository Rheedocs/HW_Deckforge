<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Resultater</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>

<main>
    <section class="info-section">
        <h2>
            Resultater
            <span th:if="${event != null}">
                for <span th:text="${event.name}"></span>
            </span>
        </h2>

        <div class="action-col">
            <a class="btn" th:if="${event != null}" th:href="@{/events/{id}(id=${event.id})}">
                Tilbage til event
            </a>
            <a class="btn"
               th:if="${event != null and session.player != null and session.player.role.name() == 'ADMIN'}"
               th:href="@{/results/event/{eventId}/register(eventId=${event.id})}">
                Registrer resultat
            </a>
        </div>

        <p class="info" th:if="${results == null or #lists.isEmpty(results)}">
            Der er endnu ingen resultater for dette event.
        </p>

        <div class="table-wrapper" th:if="${results != null and !#lists.isEmpty(results)}">
            <table>
                <thead>
                <tr>
                    <th>Event ID</th>
                    <th>Spiller ID</th>
                    <th>Placering</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="result : ${results}">
                    <td th:text="${result.eventId}"></td>
                    <td th:text="${result.playerId}"></td>
                    <td th:text="${result.placement}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
