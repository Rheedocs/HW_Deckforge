<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Opret konto</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <section class="info-section">
        <h2>Opret konto</h2>

        <div th:if="${error}" class="error" th:text="${error}"></div>

        <form th:action="@{/players/register}" method="post">
            <label for="username">Brugernavn:</label>
            <input type="text" id="username" name="username" placeholder="Dit brugernavn" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="navn@domæne.dk" required>

            <label for="password">Adgangskode:</label>
            <input type="password" id="password" name="password" required>

            <div class="consent">
                <input type="checkbox" id="consent" name="consent" required>
                <label for="consent">
                    Jeg accepterer at Deckforge gemmer mine oplysninger i henhold til vores
                    <a th:href="@{/privacy}">privatlivspolitik</a>.
                </label>
            </div>

            <button type="submit">Opret konto</button>
        </form>

        <p>Har du allerede en konto? <a th:href="@{/login}">Log ind</a></p>
    </section>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
