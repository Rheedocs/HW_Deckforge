<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Opret kort</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Opret kort</h2>
    <form th:action="@{/cards/create}" th:object="${card}" method="post">
        <label for="name">Navn:</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="cardType">Korttype:</label>
        <select id="cardType" th:field="*{cardType}">
            <option th:each="type : ${cardTypes}"
                    th:value="${type.name()}"
                    th:text="${type.displayName}"></option>
        </select>

        <label for="color">Farve:</label>
        <select id="color" th:field="*{color}">
            <option th:each="c : ${colors}"
                    th:value="${c.name()}"
                    th:text="${c.displayName}"></option>
        </select>

        <label for="setName">Sæt:</label>
        <input type="text" id="setName" th:field="*{setName}" required>

        <label for="rarity">Sjældenhed:</label>
        <select id="rarity" th:field="*{rarity}">
            <option th:each="r : ${rarities}"
                    th:value="${r.name()}"
                    th:text="${r.displayName}"></option>
        </select>

        <label for="ruleText">Regeltext:</label>
        <textarea id="ruleText" th:field="*{ruleText}" rows="3"></textarea>

        <label for="imageUrl">Billede URL:</label>
        <input type="text" id="imageUrl" th:field="*{imageUrl}" placeholder="https://cards.scryfall.io/...">

        <button type="submit">Opret kort</button>
    </form>
    <div style="margin-top: 16px;">
        <a th:href="@{/cards}">Tilbage</a>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
