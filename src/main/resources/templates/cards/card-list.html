<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Kort</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/cards.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <div th:with="isAdmin=${session.player != null and session.player.role.name() == 'ADMIN'}">
        <h2>Kort</h2>
        <table>
            <thead>
            <tr>
                <th>Billede</th>
                <th>Navn</th>
                <th>Type</th>
                <th>Farve</th>
                <th>Sjældenhed</th>
                <th>Sæt</th>
                <th>Handlinger</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="card : ${cards}">
                <td>
                    <img class="card-img-small"
                         th:src="${card.imageUrl}"
                         th:alt="${card.name}"
                         th:if="${card.imageUrl != null}">
                </td>
                <td th:text="${card.name}"></td>
                <td th:text="${card.cardType.displayName}"></td>
                <td th:text="${card.color.displayName}"></td>
                <td th:text="${card.rarity.displayName}"></td>
                <td th:text="${card.setName}"></td>
                <td class="action-col">
                    <a class="btn" th:href="@{/cards/{id}(id=${card.id})}">Se detaljer</a>
                    <a class="btn"
                       th:href="${card.scryfallUrl}"
                       target="_blank">Åbn i Scryfall</a>
                    <a class="btn"
                       th:if="${isAdmin}"
                       th:href="@{/cards/{id}/edit(id=${card.id})}">Rediger</a>
                    <a class="btn btn-danger"
                       th:if="${isAdmin}"
                       th:href="@{/cards/{id}/delete(id=${card.id})}">Slet</a>
                </td>
            </tr>
            </tbody>
        </table>
        <a class="btn list-action" th:if="${isAdmin}" th:href="@{/cards/create}">Opret nyt kort</a>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
