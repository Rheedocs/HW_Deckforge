<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Kort</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/cards.css}">
    <link rel="stylesheet" th:href="@{/css/modal.css}">
    <link rel="stylesheet" th:href="@{/css/card-picker.css}">
    <link rel="stylesheet" th:href="@{/css/card-form.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <div>
        <h2>Kort</h2>
        <a class="btn list-action" th:if="${isAdmin}" th:href="@{/cards/create}">Opret nyt kort</a>
        <div class="filter-buttons">
            <input type="text" id="cardListSearch" placeholder="Søg kortnavne..."
                   oninput="filterCardList()" style="flex:1;min-width:120px;width:auto;margin:0;">
            <select id="cardListColor" onchange="filterCardList()" style="width:auto;margin:0;">
                <option value="">Alle farver</option>
            </select>
            <select id="cardListType" onchange="filterCardList()" style="width:auto;margin:0;">
                <option value="">Alle typer</option>
            </select>
        </div>
        <!-- Mobil: kortgrid med thumbnails -->
        <div class="card-grid">
            <div th:each="card : ${cards}"
                 class="card-thumb"
                 th:data-name="${card.name}"
                 th:data-type="${card.cardType.displayName}"
                 th:data-color="${card.color.displayName}"
                 th:data-rarity="${card.rarity.displayName}"
                 th:data-set="${card.setName}"
                 th:data-rules="${card.ruleText}"
                 th:data-image="${card.imageUrl}"
                 th:data-url="${card.scryfallUrl}"
                 th:data-edit-url="${isAdmin ? '/cards/' + card.id + '/edit' : null}"
                 th:data-delete-url="${isAdmin ? '/cards/' + card.id + '/delete' : null}"
                 onclick="openModal(this)">
                <img th:if="${card.hasImage()}" th:src="${card.imageUrl}" th:alt="${card.name}">
                <div class="card-thumb-name" th:text="${card.name}"></div>
            </div>
        </div>

        <!-- Desktop: tabel -->
        <div class="table-wrapper desktop-table">
        <table>
            <thead>
            <tr>
                <th>Billede</th>
                <th>Navn</th>
                <th>Type</th>

                <th>Farve</th>
                <th>Sjældenhed</th>
                <th>Sæt</th>
                <th th:if="${isAdmin}">Handlinger</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="card : ${cards}">
                <td>
                    <img class="card-img-small"
                         th:if="${card.hasImage()}"
                         th:src="${card.imageUrl}"
                         th:alt="${card.name}"
                         th:data-name="${card.name}"
                         th:data-type="${card.cardType.displayName}"
                         th:data-color="${card.color.displayName}"
                         th:data-rarity="${card.rarity.displayName}"
                         th:data-set="${card.setName}"
                         th:data-rules="${card.ruleText}"
                         th:data-image="${card.imageUrl}"
                         th:data-url="${card.scryfallUrl}"
                         th:data-edit-url="${isAdmin ? '/cards/' + card.id + '/edit' : null}"
                         th:data-delete-url="${isAdmin ? '/cards/' + card.id + '/delete' : null}"
                         onclick="openModal(this)">
                </td>
                <td th:text="${card.name}"></td>
                <td th:text="${card.cardType.displayName}"></td>
                <td th:text="${card.color.displayName}"></td>
                <td th:text="${card.rarity.displayName}"></td>
                <td th:text="${card.setName}"></td>
                <td th:if="${isAdmin}">
                    <div class="action-col">
                        <a class="btn" th:href="@{/cards/{id}/edit(id=${card.id})}">Rediger</a>
                        <a class="btn btn-danger" th:href="@{/cards/{id}/delete(id=${card.id})}">Slet</a>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
</main>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
    <div class="modal">
        <button class="modal-close" onclick="closeModal()">&#x2715;</button>
        <img id="modalImage" src="" alt="">
        <h3 id="modalName"></h3>
        <ul>
            <li><strong>Type:</strong> <span id="modalType"></span></li>
            <li><strong>Farve:</strong> <span id="modalColor"></span></li>
            <li><strong>Sjældenhed:</strong> <span id="modalRarity"></span></li>
            <li><strong>Sæt:</strong> <span id="modalSet"></span></li>
            <li id="modalRulesItem"><strong>Regeltext:</strong> <span id="modalRules"></span></li>
        </ul>
        <a id="modalScryfall" class="btn" href="" target="_blank">Åbn i Scryfall</a>
        <div id="modalAdminHandlinger" class="modal-actions modal-action-row">
            <a id="modalRediger" class="btn" href="">Rediger</a>
            <a id="modalSlet" class="btn btn-danger" href="">Slet</a>
        </div>
        <button class="btn btn-secondary modal-close-btn" onclick="closeModal()">Luk</button>
    </div>
</div>

<footer th:replace="~{fragments :: footer}"></footer>
<script th:src="@{/js/modal.js}"></script>
<script th:src="@{/js/deck-modal.js}"></script>
<script th:src="@{/js/collection-modal.js}"></script>
<script th:src="@{/js/card-picker.js}"></script>
<script th:src="@{/js/pagination.js}"></script>
</body>
</html>
