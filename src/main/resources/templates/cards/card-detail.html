<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Kortdetaljer</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
    <link rel="stylesheet" th:href="@{/css/cards.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <img class="card-details"
         th:src="${card.imageUrl}"
         th:alt="${card.name}"
         th:if="${card.imageUrl != null}">

    <div class="info-section">
        <h2 th:text="${card.name}"></h2>
        <p><strong>Type:</strong> <span th:text="${card.cardType.displayName}"></span></p>
        <p><strong>Farve:</strong> <span th:text="${card.color.displayName}"></span></p>
        <p><strong>Sæt:</strong> <span th:text="${card.setName}"></span></p>
        <p><strong>Sjældenhed:</strong> <span th:text="${card.rarity.displayName}"></span></p>
        <p th:if="${card.ruleText != null}">
            <strong>Regeltext:</strong> <span th:text="${card.ruleText}"></span>
        </p>
    </div>

    <div class="info-section">
        <a class="btn"
           th:href="${'https://scryfall.com/search?q=!%22' + card.name.replace(' ', '%20') + '%22'}"
           target="_blank">Åbn i Scryfall</a>
        <a class="btn" th:href="@{/cards}">Tilbage</a>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
