<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Rediger kort</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Rediger kort</h2>
    <form th:action="@{/cards/{id}/edit(id=${card.id})}" th:object="${card}" method="post">
        <input type="hidden" th:field="*{id}">

        <label for="name">Navn:</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="cardType">Korttype:</label>
        <select id="cardType" th:field="*{cardType}">
            <option value="CREATURE">Creature</option>
            <option value="LAND">Land</option>
            <option value="INSTANT">Instant</option>
            <option value="SORCERY">Sorcery</option>
            <option value="ARTIFACT">Artifact</option>
            <option value="ENCHANTMENT">Enchantment</option>
            <option value="PLANESWALKER">Planeswalker</option>
        </select>

        <label for="color">Farve:</label>
        <select id="color" th:field="*{color}">
            <option value="WHITE">White</option>
            <option value="BLUE">Blue</option>
            <option value="BLACK">Black</option>
            <option value="RED">Red</option>
            <option value="GREEN">Green</option>
            <option value="COLORLESS">Colorless</option>
        </select>

        <label for="setName">Sæt:</label>
        <input type="text" id="setName" th:field="*{setName}" required>

        <label for="rarity">Sjældenhed:</label>
        <select id="rarity" th:field="*{rarity}">
            <option value="COMMON">Common</option>
            <option value="UNCOMMON">Uncommon</option>
            <option value="RARE">Rare</option>
            <option value="MYTHIC_RARE">Mythic Rare</option>
        </select>

        <label for="ruleText">Regeltext:</label>
        <textarea id="ruleText" th:field="*{ruleText}" rows="3"></textarea>

        <label for="imageUrl">Billede URL:</label>
        <input type="text" id="imageUrl" th:field="*{imageUrl}">

        <button type="submit">Gem ændringer</button>
    </form>
    <div style="margin-top: 16px;">
        <a th:href="@{/cards}">Tilbage</a>
    </div>
</main>
</body>
</html>
