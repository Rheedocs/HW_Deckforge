<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Log ind</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Log ind</h2>
    <p th:if="${param.required}" class="info">Du skal være logget ind for at se denne side.</p>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <form th:action="@{/login}" method="post">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="navn@domæne.dk" required>
        <label for="password">Adgangskode:</label>
        <input type="password" id="password" name="password" required>
        <button type="submit">Log ind</button>
    </form>
    <p>Ikke medlem endnu? <a th:href="@{/players/register}">Opret konto</a></p>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
