<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Bekræft sletning</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <section class="info-section">
        <h2>Bekræft sletning</h2>

        <p>Er du sikker på at du vil slette <strong th:text="${navn != null ? navn : event.name}"></strong>?</p>

        <div class="action-col">
            <form th:action="${deleteUrl}" method="post">
                <button type="submit" class="btn btn-danger">Ja, slet</button>
            </form>
            <a class="btn btn-secondary" th:href="${cancelUrl != null ? cancelUrl : tilbage}">Tilbage</a>
        </div>
    </section>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
