<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Rediger event</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Rediger event</h2>
    <form th:action="@{/events/{id}/edit(id=${event.id})}" th:object="${event}" method="post">
        <input type="hidden" th:field="*{id}">

        <label for="name">Navn:</label>
        <input type="text" id="name" th:field="*{name}" required>

        <label for="location">Lokation:</label>
        <input type="text" id="location" th:field="*{location}" required>

        <label for="date">Dato:</label>
        <input type="date" id="date" name="date" th:value="${#temporals.format(event.date, 'yyyy-MM-dd')}" required>

        <label for="format">Format:</label>
        <select id="format" th:field="*{format}">
            <option value="COMMANDER">Commander</option>
            <option value="STANDARD">Standard</option>
            <option value="DRAFT">Draft</option>
            <option value="CASUAL">Casual</option>
        </select>

        <label for="maxPlayers">Maks. spillere:</label>
        <input type="number" id="maxPlayers" th:field="*{maxPlayers}" min="2" required>

        <label for="status">Status:</label>
        <select id="status" th:field="*{status}">
            <option value="UPCOMING">Kommende</option>
            <option value="ONGOING">Igangværende</option>
            <option value="COMPLETED">Afsluttet</option>
            <option value="CANCELLED">Aflyst</option>
        </select>

        <button type="submit">Gem ændringer</button>
    </form>
    <div style="margin-top: 16px;">
        <a th:href="@{/events}">Tilbage</a>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
