<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<body>
<header th:fragment="header">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <div>
        <h1><a th:href="@{/}">Deckforge</a></h1>
        <input type="checkbox" id="menu-toggle" class="menu-toggle">
        <label for="menu-toggle" class="burger" aria-label="Åbn menu">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <nav class="nav">
            <a th:href="@{/cards}">Kort</a>
            <a th:if="${session.player != null}" th:href="@{/cards/player/{id}(id=${session.player.id})}">Samling</a>
            <a th:href="@{/decks}">Decks</a>
            <a th:href="@{/events}">Events</a>
            <a th:href="@{/trades}">Bytning</a>
            <a th:if="${session.player != null}" th:href="@{/players}">Spillere</a>
            <span class="nav-separator" th:if="${session.player != null}">|</span>
            <a th:if="${session.player == null}" th:href="@{/login}">Log ind</a>
            <a th:if="${session.player == null}" th:href="@{/players/register}">Opret konto</a>
            <a th:if="${session.player != null}" th:href="@{/players/{id}(id=${session.player.id})}">Profil</a>
            <a th:if="${session.player != null}" th:href="@{/logout}">Log ud</a>
            <span th:if="${session.player != null}">Logget ind som: <strong
                    th:text="${session.player.username}"></strong></span>
        </nav>
    </div>
</header>
<footer th:fragment="footer">
    <p>© 2026 Deckforge. Alle rettigheder forbeholdes.</p>
    <p>
        <a th:href="@{/privacy}">Privatlivspolitik</a> |
        <a th:href="@{/about}">Om os</a> |
        <a th:href="@{/contact}">Kontakt</a>
    </p>
</footer>
</body>
</html>
