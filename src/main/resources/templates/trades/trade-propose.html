<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Foreslå bytte</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <section class="info-section">
        <h2>Foreslå bytte</h2>

        <form th:action="@{/trades/propose/{receiverId}(receiverId=${receiverId})}" method="post">
            <label for="proposerCardIds">Dit kort:</label>
            <select id="proposerCardIds" name="proposerCardIds" required>
                <option value="" disabled selected>Vælg dit kort</option>
                <option th:each="card : ${proposerCards}"
                        th:value="${card.id}"
                        th:text="${cardMap[card.cardId] != null ? cardMap[card.cardId].name + ' (' + card.quantity + ' ejet)' : card.cardId}">
                </option>
            </select>

            <label for="receiverCardIds">Modtagerens kort:</label>
            <select id="receiverCardIds" name="receiverCardIds" required>
                <option value="" disabled th:selected="${preselectedReceiverCardId == null}">Vælg modtagerens kort</option>
                <option th:each="card : ${receiverCards}"
                        th:value="${card.id}"
                        th:selected="${preselectedReceiverCardId != null and preselectedReceiverCardId == card.id}"
                        th:text="${cardMap[card.cardId] != null ? cardMap[card.cardId].name + ' (' + card.quantity + ' ejet)' : card.cardId}">
                </option>
            </select>

            <div class="action-col">
                <button type="submit">Send bytteforslag</button>
                <a class="btn btn-secondary" th:href="@{/trades}">Tilbage</a>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
