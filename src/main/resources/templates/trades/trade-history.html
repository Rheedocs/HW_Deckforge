<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Byttehistorik</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <h2>Byttehistorik</h2>

    <p th:if="${trades.isEmpty()}">Du har ingen afsluttede handler endnu.</p>

    <table th:if="${!trades.isEmpty()}">
        <thead>
        <tr>
            <th>Status</th>
            <th>Oprettet</th>
            <th>Udløber</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="trade : ${trades}">
            <td th:text="${trade.status.getDisplayName()}"></td>
            <td th:text="${#temporals.format(trade.createdAt, 'dd-MM-yyyy HH:mm')}"></td>
            <td th:text="${#temporals.format(trade.expiresAt, 'dd-MM-yyyy HH:mm')}"></td>
        </tr>
        </tbody>
    </table>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
