<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deckforge - Profil</title>
    <link rel="stylesheet" th:href="@{/css/base.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/components.css}">
    <link rel="stylesheet" th:href="@{/css/utilities.css}">
</head>
<body>
<header th:replace="~{fragments :: header}"></header>
<main>
    <div class="info-section">
        <h2 th:text="${player.username}"></h2>
        <p th:if="${isSelf or session.player.role.name() == 'ADMIN'}">
            <strong>Email:</strong>
            <span th:text="${player.email}"></span>
        </p>
        <p>
            <strong>Samling:</strong>
            <span th:text="${player.collectionVisibility.displayName}"></span>
        </p>
    </div>

    <div class="profile-stats-grid">
        <div class="info-section stat-box">
            <span class="stat-number">0</span>
            <span class="stat-label">Turneringer</span>
        </div>
        <div class="info-section stat-box">
            <a th:href="@{/cards/player/{id}(id=${player.id})}">
                <span class="stat-number" th:text="${cardCount}">0</span>
                <span class="stat-label">Kort</span>
            </a>
        </div>
        <div class="info-section stat-box">
            <a th:href="@{/decks/player/{id}(id=${player.id})}">
                <span class="stat-number" th:text="${deckCount}">0</span>
                <span class="stat-label">Decks</span>
            </a>
        </div>
    </div>

    <div th:if="${!isSelf}" class="info-section">
        <h3>Handlinger</h3>
        <a class="btn" th:href="@{/trades/propose}">Foreslå bytte</a>
    </div>

    <div th:if="${isSelf}" class="info-section">
        <h3>Din konto</h3>
        <a class="btn"
           th:href="@{/players/{id}/edit(id=${player.id})}">Rediger profil</a>
        <a class="btn btn-danger"
           th:href="@{/players/{id}/delete(id=${player.id})}">Slet konto</a>
        <a class="btn" th:href="@{/logout}">Log ud</a>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
